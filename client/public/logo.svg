<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5722;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1" stroke="url(#logoGradient)" stroke-width="2"/>

  <!-- Main square with gradient -->
  <rect x="50" y="50" width="100" height="100" rx="16" fill="url(#logoGradient)"/>

  <!-- Fork icon -->
  <g transform="translate(100, 100)">
    <!-- Handle -->
    <rect x="-4" y="10" width="8" height="25" fill="white" rx="2"/>

    <!-- Tines -->
    <rect x="-28" y="-15" width="6" height="28" fill="white" rx="2"/>
    <rect x="-10" y="-15" width="6" height="28" fill="white" rx="2"/>
    <rect x="8" y="-15" width="6" height="28" fill="white" rx="2"/>
    <rect x="26" y="-15" width="6" height="28" fill="white" rx="2"/>
  </g>

  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ff7b00">MANU</text>
</svg>