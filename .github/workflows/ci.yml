name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 18.x, 20.x ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Install microservice dependencies
        run: |
          npm install --prefix microservices/auth-service
          npm install --prefix microservices/order-service
          npm install --prefix microservices/translation-service
          npm install --prefix microservices/api-gateway

      - name: Lint client code
        # Lint result doesn't vary by Node version — only run it once, not per matrix leg.
        if: matrix.node-version == '20.x'
        run: npm run lint --prefix client
        continue-on-error: true

      - name: Build client
        run: npm run build --prefix client

      - name: Run server tests
        run: npm test --prefix server

      - name: Run microservice tests
        run: |
          npm test --prefix microservices/auth-service
          npm test --prefix microservices/order-service
          npm test --prefix microservices/translation-service
          npm test --prefix microservices/api-gateway

  security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          npm install --prefix server
          npm install --prefix client

      - name: Audit dependencies
        run: |
          npm audit --prefix server || true
          npm audit --prefix client || true

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --prefix client

      - name: Run React Doctor
        run: npm run doctor
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  dependency-updates:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check for outdated dependencies
        run: |
          npm install -g npm-check-updates
          echo "Server outdated packages:"
          ncu --prefix server || true
          echo ""
          echo "Client outdated packages:"
          ncu --prefix client || true
        continue-on-error: true
